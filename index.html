<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookmark Manager</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

/* TOP BAR */
.topbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
  background: #222;
  color: white;
  align-items: center;
}

.topbar input[type="file"] {
  max-width: 180px;
}

.topbar input[type="text"] {
  flex: 1;
  min-width: 120px;
}

button {
  padding: 6px 10px;
  border: none;
  background: #444;
  color: white;
  border-radius: 4px;
}

button:hover {
  background: #666;
}

/* GRID */
.grid {
  display: grid;
  gap: 12px;
  padding: 12px;
}

/* Responsive columns */
@media (min-width: 1200px) {
  .grid { grid-template-columns: repeat(5, 1fr); }
}
@media (min-width: 900px) and (max-width: 1199px) {
  .grid { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 600px) and (max-width: 899px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 599px) {
  .grid { grid-template-columns: 1fr; }
}

/* CARD */
.card {
  background: white;
  border-radius: 8px;
  padding: 8px;
  display: flex;
  flex-direction: column;
}

.card.selected {
  outline: 3px solid #4caf50;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 4px;
}

.card h4 {
  margin: 8px 0 4px;
  font-size: 14px;
}

.card a {
  text-decoration: none;
  color: black;
}

/* TAGS */
.tags {
  margin-top: auto;
}

.tag {
  display: inline-block;
  background: #ddd;
  padding: 3px 6px;
  margin: 2px;
  font-size: 11px;
  border-radius: 4px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 10px;
}

.modal-content {
  background: white;
  padding: 20px;
  width: 100%;
  max-width: 400px;
  border-radius: 8px;
}

.modal-content input {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
}

/* SMALL SCREEN TWEAKS */
@media (max-width: 500px) {
  .topbar {
    flex-direction: column;
    align-items: stretch;
  }

  button {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <input type="file" id="fileInput">
  <button onclick="exportData()">Export</button>
  <button onclick="openModal()">Add</button>

  <button onclick="selectAll()">Select All</button>
  <button onclick="clearSelection()">Clear</button>

  <button onclick="bulkAddTag()">Add Tag</button>
  <button onclick="bulkRemoveTag()">Remove Tag</button>
  <button onclick="bulkDelete()">Delete</button>

  <input type="text" placeholder="Search..." oninput="search(this.value)">

  <span>Selected: <strong id="selectedCount">0</strong></span>
</div>

<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Entry</h3>

    <input id="title" placeholder="Title">
    <input id="url" placeholder="URL">
    <input id="thumb" placeholder="Thumbnail URL">
    <input id="tags" placeholder="Tags (comma separated)">

    <button onclick="saveEntry()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
let entries = [];
let filtered = [];
let selected = new Set();
let editingId = null;

function uid() {
  return Date.now().toString();
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("selectedCount").textContent = selected.size;

  filtered.forEach(entry => {
    const card = document.createElement("div");
    card.className = "card " + (selected.has(entry.id) ? "selected" : "");

    card.innerHTML = `
      <input type="checkbox" ${selected.has(entry.id) ? "checked" : ""} 
        onchange="toggleSelect('${entry.id}')">

      <a href="${entry.url}" target="_blank">
        <img src="${entry.thumbnail}">
        <h4>${entry.title}</h4>
      </a>

      <div class="tags">
        ${entry.tags.map(t => `<span class="tag">${t}</span>`).join("")}
      </div>

      <button onclick="editEntry('${entry.id}')">Edit</button>
    `;

    grid.appendChild(card);
  });
}

function search(q) {
  q = q.toLowerCase();

  filtered = entries.filter(e =>
    e.title.toLowerCase().includes(q) ||
    e.url.toLowerCase().includes(q) ||
    e.tags.some(t => t.toLowerCase().includes(q))
  );

  render();
}

function toggleSelect(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  render();
}

function selectAll() {
  filtered.forEach(e => selected.add(e.id));
  render();
}

function clearSelection() {
  selected.clear();
  render();
}

function bulkDelete() {
  if (!confirm("Delete selected?")) return;
  entries = entries.filter(e => !selected.has(e.id));
  selected.clear();
  filtered = entries;
  render();
}

function bulkAddTag() {
  const tag = prompt("Tag:");
  if (!tag) return;

  entries.forEach(e => {
    if (selected.has(e.id) && !e.tags.includes(tag)) {
      e.tags.push(tag);
    }
  });

  render();
}

function bulkRemoveTag() {
  const tag = prompt("Tag:");
  if (!tag) return;

  entries.forEach(e => {
    if (selected.has(e.id)) {
      e.tags = e.tags.filter(t => t !== tag);
    }
  });

  render();
}

function openModal(edit = false) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").textContent = edit ? "Edit Entry" : "Add Entry";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  editingId = null;
}

function saveEntry() {
  const title = document.getElementById("title").value;
  const url = document.getElementById("url").value;
  const thumb = document.getElementById("thumb").value;
  const tags = document.getElementById("tags").value.split(",").map(t => t.trim()).filter(Boolean);

  if (!title || !url) return;

  if (editingId) {
    const e = entries.find(e => e.id === editingId);
    e.title = title;
    e.url = url;
    e.thumbnail = thumb;
    e.tags = tags;
  } else {
    entries.push({
      id: uid(),
      title,
      url,
      thumbnail: thumb,
      tags
    });
  }

  filtered = entries;
  closeModal();
  render();
}

function editEntry(id) {
  const e = entries.find(e => e.id === id);

  document.getElementById("title").value = e.title;
  document.getElementById("url").value = e.url;
  document.getElementById("thumb").value = e.thumbnail;
  document.getElementById("tags").value = e.tags.join(", ");

  editingId = id;
  openModal(true);
}

document.getElementById("fileInput").addEventListener("change", e => {
  const reader = new FileReader();

  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      entries = data.entries || [];
      filtered = entries;
      selected.clear();
      render();
    } catch {
      alert("Invalid file");
    }
  };

  reader.readAsText(e.target.files[0]);
});

function exportData() {
  const blob = new Blob([JSON.stringify({ entries }, null, 2)], {
    type: "application/json"
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.json";
  a.click();
}

filtered = entries;
</script>

</body>
</html>
